# Daily retrain — runs after daily-scrape commits fresh data.
#
# What it does:
#   1. Checks out the latest data/scraped_jobs.csv (just updated by daily-scrape)
#   2. Cleans + loads into SQLite, retrains the model, regenerates the dashboard
#   3. Force-commits report/dashboard.html + models/*.pkl + models/*.json back
#      to the repo (these paths are normally gitignored as "derived from CSV,
#      local-only" — this workflow overrides that so a plain `git pull` gives
#      you the fully trained model + fresh dashboard, no local training needed)
#
# Required repo secrets: none (uses checked-out data only)

name: daily-retrain

on:
  workflow_run:
    workflows: ["daily-scrape"]
    types: [completed]
  workflow_dispatch:      # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-retrain
  cancel-in-progress: false

jobs:
  retrain:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load data (scrape + Kaggle real bands)
        # jobs.db is gitignored, so CI rebuilds it from the committed CSVs.
        # Load the scrape CSV *and* the Kaggle real-band CSV so the retrain
        # reproduces the blended model (~R2 0.42), not a scrape-only ~0.17.
        run: |
          python predict.py pipeline --csv data/scraped_jobs.csv
          python data_pipeline.py --csv data/kaggle_indian_tech_jobs_2026.csv --source kaggle:indian-tech-jobs-2026

      - name: Retrain
        run: python predict.py train

      - name: Grade against contract (loop evaluator)
        # Evaluator role, separate from training. REJECT (exit 1) fails the job
        # BEFORE the commit step, so a regressed or leaked model is never pushed.
        # --no-tests: the unit suite is gated separately in ci.yml.
        run: python .loop/evaluate.py --no-tests

      - name: Regenerate report + log run + refresh progress snapshot
        run: |
          python predict.py report
          python log_run.py
          python .loop/update_progress.py

      - name: Commit updated model + dashboard + run history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f report/dashboard.html models/*.pkl models/*.json
          git add RUN_HISTORY.md .loop/progress.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily retrain: refresh model + dashboard ($(date -u +%F))"
            git push
          fi
