# Daily cloud scrape — runs on GitHub's servers, so your Mac can be asleep.
#
# What it does:
#   1. Scrapes fresh jobs via the Adzuna API (keys from repo secrets)
#   2. Commits the updated data/scraped_jobs.csv back to the repo
#
# It deliberately does NOT train the model itself — that's handled by the
# daily-retrain workflow (.github/workflows/train.yml), which triggers
# automatically once this workflow completes. Just `git pull` afterwards
# to get the fresh CSV, retrained model, and regenerated dashboard.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ADZUNA_APP_ID, ADZUNA_APP_KEY
#
# 05:30 UTC = 11:00 IST.

name: daily-scrape

on:
  workflow_dispatch:      # allow manual runs from the Actions tab
  schedule:
    - cron: "30 5 * * *"

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scraper dependencies
        run: pip install requests python-dotenv

      - name: Run scraper
        env:
          API_SOURCE: adzuna
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python scraper.py --pages 2

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped_jobs.csv
          if git diff --cached --quiet; then
            echo "No new jobs today — nothing to commit."
          else
            n=$(($(wc -l < data/scraped_jobs.csv) - 1))
            git commit -m "Daily scrape: $n total jobs ($(date -u +%F))"
            git push
          fi
