# Run the unit test suite on every push / PR.

name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v

      # Grade the committed model against .loop/contract.md, for visibility only.
      # Non-blocking: the real gate is in train.yml, before the model is committed.
      # This surfaces the SHIP/REJECT verdict on every push without failing builds
      # for unrelated changes. --no-tests: the suite ran in the step above.
      - name: Grade committed model against contract (report only)
        continue-on-error: true
        run: python .loop/evaluate.py --no-tests
